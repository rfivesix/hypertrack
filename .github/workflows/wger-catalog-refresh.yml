name: Wger Catalog Refresh

"on":
  workflow_dispatch:
    inputs:
      fail_on_breaking:
        description: "Fail workflow if diff detects breaking changes"
        required: false
        default: true
        type: boolean
      publish_release_assets:
        description: "Publish DB/manifest/build-report to the catalog release channel"
        required: false
        default: true
        type: boolean
  schedule:
    - cron: "0 5 * * 1"

permissions:
  contents: write

jobs:
  refresh-catalog:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      GENERATED_DB_PATH: artifacts/hypertrack_training.db
      BUILD_REPORT_PATH: artifacts/wger_build_report.json
      DIFF_REPORT_PATH: artifacts/wger_diff_report.json
      MANIFEST_PATH: artifacts/wger_catalog_manifest.json
      RELEASE_NOTES_PATH: artifacts/wger_release_notes.md
      RELEASE_REFERENCE_MANIFEST_PATH: artifacts/reference_wger_catalog_manifest.json
      RELEASE_REFERENCE_DB_PATH: artifacts/reference_hypertrack_training.db
      RELEASE_TAG: wger-catalog-stable
      RELEASE_NAME: Wger Catalog Data (stable channel)
      RELEASE_CHANNEL: stable
      RELEASE_DOWNLOAD_BASE: https://github.com/${{ github.repository }}/releases/download/wger-catalog-stable/
      RELEASE_PAGE_URL: https://github.com/${{ github.repository }}/releases/tag/wger-catalog-stable
      FAIL_ON_BREAKING: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.fail_on_breaking || 'true' }}
      PUBLISH_RELEASE_ASSETS: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.publish_release_assets || 'true' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Validate script syntax
        run: |
          python -m py_compile skript/create_wger_exercise_db.py
          python -m py_compile skript/wger_catalog_diff.py
          python -m py_compile skript/resolve_wger_reference_manifest.py
          python -m py_compile skript/build_wger_catalog_manifest.py
          python -m py_compile skript/build_wger_release_notes.py
          python -m py_compile skript/publish_wger_run_summary.py

      - name: Generate exercise catalog and build report
        id: generate
        run: |
          mkdir -p artifacts
          python skript/create_wger_exercise_db.py \
            --db-out "$GENERATED_DB_PATH" \
            --report-json-out "$BUILD_REPORT_PATH"

      - name: Mark generator success
        id: generator_status
        if: always()
        run: |
          if [ -f "$GENERATED_DB_PATH" ] && [ -f "$BUILD_REPORT_PATH" ]; then
            echo "generator_success=true" >> "$GITHUB_OUTPUT"
          else
            echo "generator_success=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Resolve previous published catalog baseline
        id: resolve_reference
        if: steps.generator_status.outputs.generator_success == 'true'
        run: |
          mkdir -p artifacts

          MANIFEST_URL="${RELEASE_DOWNLOAD_BASE}wger_catalog_manifest.json"
          echo "Trying release manifest: $MANIFEST_URL"

          if curl -fsSL "$MANIFEST_URL" -o "$RELEASE_REFERENCE_MANIFEST_PATH"; then
            echo "reference_manifest_found=true" >> "$GITHUB_OUTPUT"
            python skript/resolve_wger_reference_manifest.py
          else
            echo "reference_manifest_found=false" >> "$GITHUB_OUTPUT"
            echo "No previous release manifest found. Diff baseline unavailable." | tee artifacts/wger_reference_missing.txt
          fi

      - name: Download previous published catalog DB
        id: download_reference
        if: steps.generator_status.outputs.generator_success == 'true' && steps.resolve_reference.outputs.reference_manifest_found == 'true'
        continue-on-error: true
        run: |
          if curl -fsSL "${{ steps.resolve_reference.outputs.reference_db_url }}" -o "$RELEASE_REFERENCE_DB_PATH"; then
            echo "reference_db_found=true" >> "$GITHUB_OUTPUT"
          else
            echo "reference_db_found=false" >> "$GITHUB_OUTPUT"
            echo "Failed to download previous release DB from ${{ steps.resolve_reference.outputs.reference_db_url }}" | tee artifacts/wger_reference_db_download_failed.txt
          fi

      - name: Diff against previous published catalog (if available)
        id: diff
        if: steps.generator_status.outputs.generator_success == 'true'
        continue-on-error: true
        run: |
          mkdir -p artifacts

          if [ -f "$RELEASE_REFERENCE_DB_PATH" ]; then
            echo "reference_db_found=true" >> "$GITHUB_OUTPUT"
            DIFF_CMD="python skript/wger_catalog_diff.py --old \"$RELEASE_REFERENCE_DB_PATH\" --new \"$GENERATED_DB_PATH\" --json-out \"$DIFF_REPORT_PATH\""
            if [ "$FAIL_ON_BREAKING" = "true" ]; then
              DIFF_CMD="$DIFF_CMD --fail-on-breaking"
            fi
            echo "Running diff command: $DIFF_CMD"
            eval "$DIFF_CMD"
          else
            echo "reference_db_found=false" >> "$GITHUB_OUTPUT"
            echo "Published reference DB not available. Skipping diff." | tee artifacts/wger_diff_skipped.txt
            printf '%s\n' \
              '{' \
              '  "skipped": true,' \
              '  "reason": "published_reference_db_missing",' \
              "  \"reference_db_path\": \"$RELEASE_REFERENCE_DB_PATH\"" \
              '}' > "$DIFF_REPORT_PATH"
          fi

      - name: Build catalog manifest artifact
        if: steps.generator_status.outputs.generator_success == 'true'
        run: python skript/build_wger_catalog_manifest.py

      - name: Build release notes
        if: steps.generator_status.outputs.generator_success == 'true'
        run: python skript/build_wger_release_notes.py

      - name: Upload generated DB artifact
        if: always() && steps.generator_status.outputs.generator_success == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: wger-generated-db
          path: ${{ env.GENERATED_DB_PATH }}
          if-no-files-found: error

      - name: Upload build report artifact
        if: always() && steps.generator_status.outputs.generator_success == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: wger-build-report
          path: ${{ env.BUILD_REPORT_PATH }}
          if-no-files-found: error

      - name: Upload catalog manifest artifact
        if: always() && steps.generator_status.outputs.generator_success == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: wger-catalog-manifest
          path: ${{ env.MANIFEST_PATH }}
          if-no-files-found: error

      - name: Upload diff report artifact
        if: always() && steps.generator_status.outputs.generator_success == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: wger-diff-report
          path: ${{ env.DIFF_REPORT_PATH }}
          if-no-files-found: error

      - name: Upload release notes artifact
        if: always() && steps.generator_status.outputs.generator_success == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: wger-release-notes
          path: ${{ env.RELEASE_NOTES_PATH }}
          if-no-files-found: error

      - name: Publish release assets (catalog channel)
        id: publish_release
        if: steps.generator_status.outputs.generator_success == 'true' && env.PUBLISH_RELEASE_ASSETS == 'true' && (steps.diff.outputs.reference_db_found != 'true' || steps.diff.outcome == 'success' || env.FAIL_ON_BREAKING != 'true')
        uses: ncipollo/release-action@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag: ${{ env.RELEASE_TAG }}
          name: ${{ env.RELEASE_NAME }}
          prerelease: true
          allowUpdates: true
          replacesArtifacts: true
          makeLatest: "false"
          artifacts: |
            ${{ env.GENERATED_DB_PATH }}
            ${{ env.BUILD_REPORT_PATH }}
            ${{ env.DIFF_REPORT_PATH }}
            ${{ env.MANIFEST_PATH }}
          bodyFile: ${{ env.RELEASE_NOTES_PATH }}

      - name: Publish run summary
        if: always()
        run: python skript/publish_wger_run_summary.py
        env:
          PUBLISH_OUTCOME: ${{ steps.publish_release.outcome }}
          GENERATOR_SUCCESS: ${{ steps.generator_status.outputs.generator_success }}
          GENERATE_OUTCOME: ${{ steps.generate.outcome }}

      - name: Enforce safety gate result
        if: always() && steps.generator_status.outputs.generator_success == 'true' && steps.diff.outputs.reference_db_found == 'true' && env.FAIL_ON_BREAKING == 'true' && steps.diff.outcome == 'failure'
        run: |
          echo "Diff safety validation failed under --fail-on-breaking."
          exit 1
