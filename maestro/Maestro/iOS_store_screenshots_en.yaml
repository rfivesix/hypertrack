appId: com.rfivesix.trainlibre
---
- launchApp:
    clearState: true

- tapOn: "0"
- tapOn:
    point: "20%,65%" # ToS
- tapOn: "Accept & Get Started"
# - tapOn: "Allow"
- extendedWaitUntil:
    visible: "Restore from Backup"
    timeout: 60000
- tapOn: "Restore from Backup"
- tapOn: "backup.json"
- tapOn: "Open"
- extendedWaitUntil:
    visible: "Maybe later" 
    timeout: 60000
- tapOn: 
    text: "Maybe later"
- tapOn: 
    text: "Diary"
    optional: true
    repeat: 2
    delay: 10000
- takeScreenshot: 01_diary
- tapOn: "Nutrition"
- takeScreenshot: 02_nutrition
- tapOn:
    point: 91%,13%
- tapOn: "Settings\nTheme, units, data and more"
- scrollUntilVisible:
    element: "Data backup & import\nCreate backups, restore, and import data."
- tapOn: "Data backup & import\nCreate backups, restore, and import data."
- takeScreenshot: 03_data
- tapOn: "Back"
- tapOn: "Back"
- tapOn: "Back"
- waitForAnimationToEnd
- tapOn:
