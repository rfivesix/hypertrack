- tapOn: "Muscle Readiness\nCurrently\nSeveral muscle groups still recovering\nRecovering: 5  Ready: 3  Fresh: 2"
- takeScreenshot: 05_recovery
- tapOn: "Back"
- tapOn:
    point: 91%,13%
- tapOn: "Settings\nTheme, units, data and more"
- scrollUntilVisible:
    element: "AI Meal Capture\nConfigure AI-powered meal recognition."
- tapOn: "AI Meal Capture\nConfigure AI-powered meal recognition."
- tapOn: "0"
- tapOn: "Back"
- tapOn: "Back"
- tapOn: "Back"
- tapOn:
